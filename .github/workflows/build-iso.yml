# Build Clawitzer ISO. Default: placeholder; use remote-build job when BUILD_HOST + SSH key are configured.
name: Build ISO

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Check build deps
        run: |
          echo "Cubic/live-build not installed on runner by default."
          echo "For full ISO build, configure remote-build job (BUILD_HOST + BUILD_SSH_KEY secrets)."
          echo "See docs/BUILD.md and cloud/README.md."

      - name: Placeholder artifact
        run: |
          mkdir -p _build
          echo "Clawitzer ISO build – use remote build for full ISO." > _build/README.txt

      - uses: actions/upload-artifact@v4
        with:
          name: clawitzer-build
          path: _build/

  # Run when BUILD_HOST and BUILD_SSH_KEY repo secrets are set (Hetzner/DO VM).
  remote-build:
    runs-on: ubuntu-24.04
    if: ${{ secrets.BUILD_HOST != '' && secrets.BUILD_SSH_KEY != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.BUILD_SSH_KEY }}" > ~/.ssh/build_key
          chmod 600 ~/.ssh/build_key
          BUILD_HOST="${{ secrets.BUILD_HOST }}"
          HOST="${BUILD_HOST#*@}"
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Remote build
        env:
          BUILD_HOST: ${{ secrets.BUILD_HOST }}
        run: |
          chmod +x cloud/scripts/remote-build.sh
          ssh -i ~/.ssh/build_key -o StrictHostKeyChecking=accept-new "${{ secrets.BUILD_HOST }}" "mkdir -p clawitzer-build"
          rsync -avz -e "ssh -i ~/.ssh/build_key" --exclude .git . "${{ secrets.BUILD_HOST }}:clawitzer-build/"
          ssh -i ~/.ssh/build_key "${{ secrets.BUILD_HOST }}" "cd clawitzer-build && ./distro/scripts/build-iso.sh" || true
          rsync -avz -e "ssh -i ~/.ssh/build_key" "${{ secrets.BUILD_HOST }}:clawitzer-build/_build/" _build/ || true

      - uses: actions/upload-artifact@v4
        with:
          name: clawitzer-iso-remote
          path: _build/
